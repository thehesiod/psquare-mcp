name: Publish

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"

      - name: Verify pyproject version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -e
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="$GITHUB_REF_NAME"
          echo "pyproject=$PKG_VERSION tag=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version ($PKG_VERSION) does not match tag ($TAG_VERSION). Bump pyproject.toml and server.json, then retag."
            exit 1
          fi

      - name: Verify server.json version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -e
          SRV_VERSION=$(python -c "import json; d=json.load(open('server.json')); print(d['version'])")
          PKG_IN_SRV=$(python -c "import json; d=json.load(open('server.json')); print(d['packages'][0]['version'])")
          TAG_VERSION="$GITHUB_REF_NAME"
          echo "server.json=$SRV_VERSION packages[0]=$PKG_IN_SRV tag=$TAG_VERSION"
          if [ "$SRV_VERSION" != "$TAG_VERSION" ] || [ "$PKG_IN_SRV" != "$TAG_VERSION" ]; then
            echo "::error::server.json version ($SRV_VERSION) or packages[0].version ($PKG_IN_SRV) does not match tag ($TAG_VERSION)."
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@v1.14.0

  registry-publish:
    name: Publish to MCP Registry
    needs: pypi-publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          set -e
          curl -fsSL -o /tmp/mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz
          tar xzf /tmp/mcp-publisher.tar.gz -C /tmp
          sudo install -m 0755 /tmp/mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --version

      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish server.json
        run: mcp-publisher publish

  github-release:
    name: Create GitHub Release
    needs: pypi-publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
